
<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMC</title>
    <link rel="stylesheet" href="IMC.CSS">
</head>

<body>

       <header>
        <h2> Calculadora de IMC</h2>
    </header>
    <main>
        <section>

            <label for="lPeso" id="lPeso">Peso(kG)</label>

            <label for="lAltura" id="lAltura">Altura(m)</label>

            <input type="button" value="Calcular" onclick="FuncaoImc()">
     <div id="resposta"></div>
        </section>
    </main>

    <footer id="footer">
        <span id="mensagem">Preencha os valores e calcule</span>
    </footer>

    <script src="IMC.JS"></script>

</html>
